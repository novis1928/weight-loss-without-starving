<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img"><title>Your First Month of Strength Training</title><defs><style>.title{font:700 42px Arial;fill:#0f172a}.subtitle{font:400 22px Arial;fill:#475569}.h{font:700 28px Arial;fill:#0f172a}.body{font:400 20px Arial;fill:#334155}.small{font:400 17px Arial;fill:#64748b}.label{font:700 18px Arial;fill:#166534}.white{fill:#fff}</style><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity=".12"/></filter><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#22c55e"/></marker></defs><rect width="1200" height="675" fill="#f8fafc"/><text x="600" y="72" text-anchor="middle" class="title">Your First Month of Strength Training</text><text x="600" y="110" text-anchor="middle" class="subtitle">Build the habit before chasing heavy weights</text><line x1="150" y1="300" x2="1050" y2="300" stroke="#bbf7d0" stroke-width="16" stroke-linecap="round"/><g><circle cx="180" cy="300" r="52" fill="#22c55e"/><text x="180" y="310" text-anchor="middle" class="white" style="font:700 28px Arial">1</text><circle cx="460" cy="300" r="52" fill="#22c55e"/><text x="460" y="310" text-anchor="middle" class="white" style="font:700 28px Arial">2</text><circle cx="740" cy="300" r="52" fill="#22c55e"/><text x="740" y="310" text-anchor="middle" class="white" style="font:700 28px Arial">3</text><circle cx="1020" cy="300" r="52" fill="#22c55e"/><text x="1020" y="310" text-anchor="middle" class="white" style="font:700 28px Arial">4</text></g><g filter="url(#shadow)"><rect x="70" y="385" width="220" height="175" rx="22" fill="#fff"/><rect x="350" y="385" width="220" height="175" rx="22" fill="#fff"/><rect x="630" y="385" width="220" height="175" rx="22" fill="#fff"/><rect x="910" y="385" width="220" height="175" rx="22" fill="#fff"/></g><text x="180" y="430" text-anchor="middle" class="label">WEEK 1</text><text x="180" y="468" text-anchor="middle" class="h">Technique</text><text x="180" y="505" text-anchor="middle" class="small">Use light weights</text><text x="180" y="532" text-anchor="middle" class="small">and learn form</text><text x="460" y="430" text-anchor="middle" class="label">WEEK 2</text><text x="460" y="468" text-anchor="middle" class="h">Confidence</text><text x="460" y="505" text-anchor="middle" class="small">Repeat the same</text><text x="460" y="532" text-anchor="middle" class="small">core exercises</text><text x="740" y="430" text-anchor="middle" class="label">WEEK 3</text><text x="740" y="468" text-anchor="middle" class="h">Effort</text><text x="740" y="505" text-anchor="middle" class="small">Add reps or a</text><text x="740" y="532" text-anchor="middle" class="small">small amount of weight</text><text x="1020" y="430" text-anchor="middle" class="label">WEEK 4</text><text x="1020" y="468" text-anchor="middle" class="h">Habit</text><text x="1020" y="505" text-anchor="middle" class="small">Review progress</text><text x="1020" y="532" text-anchor="middle" class="small">and keep showing up</text><text x="600" y="625" text-anchor="middle" class="body">Success in month one = consistent workouts and better technique.</text></svg>