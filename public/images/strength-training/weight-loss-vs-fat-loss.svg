<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img"><title>Weight Loss vs Fat Loss</title><defs><style>.title{font:700 42px Arial;fill:#0f172a}.subtitle{font:400 22px Arial;fill:#475569}.h{font:700 28px Arial;fill:#0f172a}.body{font:400 20px Arial;fill:#334155}.small{font:400 17px Arial;fill:#64748b}.label{font:700 18px Arial;fill:#166534}.white{fill:#fff}</style><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity=".12"/></filter><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#22c55e"/></marker></defs><rect width="1200" height="675" fill="#f8fafc"/><text x="600" y="72" text-anchor="middle" class="title">Weight Loss vs Fat Loss</text><text x="600" y="110" text-anchor="middle" class="subtitle">The scale does not tell the whole story</text><g filter="url(#shadow)"><rect x="80" y="165" width="470" height="420" rx="26" fill="#fff"/><rect x="650" y="165" width="470" height="420" rx="26" fill="#fff"/></g><circle cx="315" cy="255" r="70" fill="#e2e8f0"/><text x="315" y="248" text-anchor="middle" class="h">Scale</text><text x="315" y="282" text-anchor="middle" class="body">goes down</text><circle cx="885" cy="255" r="70" fill="#dcfce7"/><text x="885" y="248" text-anchor="middle" class="h">Body fat</text><text x="885" y="282" text-anchor="middle" class="body">goes down</text><text x="315" y="365" text-anchor="middle" class="h">Weight Loss</text><text x="315" y="410" text-anchor="middle" class="body">May include fat, muscle,</text><text x="315" y="442" text-anchor="middle" class="body">water, and glycogen</text><text x="315" y="500" text-anchor="middle" class="small">Fast scale changes do not always</text><text x="315" y="527" text-anchor="middle" class="small">mean better body composition.</text><text x="885" y="365" text-anchor="middle" class="h">Fat Loss</text><text x="885" y="410" text-anchor="middle" class="body">Focuses on reducing fat</text><text x="885" y="442" text-anchor="middle" class="body">while preserving muscle</text><text x="885" y="500" text-anchor="middle" class="small">Progress may be slower on the scale</text><text x="885" y="527" text-anchor="middle" class="small">but better for strength and shape.</text><rect x="310" y="615" width="580" height="42" rx="21" fill="#22c55e"/><text x="600" y="643" text-anchor="middle" class="white" style="font:700 19px Arial">Aim to become leaner, stronger, and healthier</text></svg>