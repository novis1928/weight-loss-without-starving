<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img"><title>Strength Training vs Cardio</title><defs><style>.title{font:700 42px Arial;fill:#0f172a}.subtitle{font:400 22px Arial;fill:#475569}.h{font:700 28px Arial;fill:#0f172a}.body{font:400 20px Arial;fill:#334155}.small{font:400 17px Arial;fill:#64748b}.label{font:700 18px Arial;fill:#166534}.white{fill:#fff}</style><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity=".12"/></filter><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#22c55e"/></marker></defs><rect width="1200" height="675" fill="#f8fafc"/><text x="600" y="70" text-anchor="middle" class="title">Strength Training vs Cardio</text><text x="600" y="108" text-anchor="middle" class="subtitle">Both support weight loss — in different ways</text><rect x="70" y="155" width="500" height="430" rx="26" fill="#fff" filter="url(#shadow)"/><rect x="630" y="155" width="500" height="430" rx="26" fill="#fff" filter="url(#shadow)"/><rect x="70" y="155" width="500" height="72" rx="26" fill="#dcfce7"/><rect x="630" y="155" width="500" height="72" rx="26" fill="#e2e8f0"/><text x="320" y="201" text-anchor="middle" class="h">Strength Training</text><text x="880" y="201" text-anchor="middle" class="h">Cardio</text><g class="body"><text x="110" y="275">✓ Preserves lean muscle</text><text x="110" y="325">✓ Improves strength</text><text x="110" y="375">✓ Supports body composition</text><text x="110" y="425">✓ Builds bone resilience</text><text x="110" y="475">✓ Makes daily movement easier</text><text x="110" y="525">✓ Best for long-term function</text><text x="670" y="275">✓ Burns more calories during exercise</text><text x="670" y="325">✓ Improves heart fitness</text><text x="670" y="375">✓ Builds endurance</text><text x="670" y="425">✓ Helps increase weekly activity</text><text x="670" y="475">✓ Includes walking, cycling, running</text><text x="670" y="525">✓ Best for stamina and conditioning</text></g><rect x="300" y="610" width="600" height="46" rx="23" fill="#22c55e"/><text x="600" y="641" text-anchor="middle" class="white" style="font:700 21px Arial">Best approach: combine both consistently</text></svg>