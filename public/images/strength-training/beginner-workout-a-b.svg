<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img"><title>Beginner Workout A and Workout B</title><defs><style>.title{font:700 42px Arial;fill:#0f172a}.subtitle{font:400 22px Arial;fill:#475569}.h{font:700 28px Arial;fill:#0f172a}.body{font:400 20px Arial;fill:#334155}.small{font:400 17px Arial;fill:#64748b}.label{font:700 18px Arial;fill:#166534}.white{fill:#fff}</style><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity=".12"/></filter><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#22c55e"/></marker></defs><rect width="1200" height="675" fill="#f8fafc"/><text x="600" y="72" text-anchor="middle" class="title">Beginner Full-Body Workout Plan</text><text x="600" y="110" text-anchor="middle" class="subtitle">Alternate Workout A and Workout B throughout the week</text><g filter="url(#shadow)"><rect x="70" y="155" width="500" height="440" rx="26" fill="#fff"/><rect x="630" y="155" width="500" height="440" rx="26" fill="#fff"/></g><rect x="70" y="155" width="500" height="70" rx="26" fill="#dcfce7"/><rect x="630" y="155" width="500" height="70" rx="26" fill="#dcfce7"/><text x="320" y="200" text-anchor="middle" class="h">Workout A</text><text x="880" y="200" text-anchor="middle" class="h">Workout B</text><g class="body"><text x="115" y="275">1. Goblet Squat — 3 × 8–12</text><text x="115" y="335">2. Dumbbell Bench Press — 3 × 8–12</text><text x="115" y="395">3. Seated Cable Row — 3 × 10–12</text><text x="115" y="455">4. Romanian Deadlift — 3 × 10</text><text x="115" y="515">5. Plank — 3 × 30–45 sec</text><text x="675" y="275">1. Leg Press — 3 × 10–12</text><text x="675" y="335">2. Lat Pulldown — 3 × 8–12</text><text x="675" y="395">3. Shoulder Press — 3 × 8–12</text><text x="675" y="455">4. Dumbbell RDL — 3 × 10</text><text x="675" y="515">5. Dead Bug — 3 × 10/side</text></g><rect x="345" y="615" width="510" height="42" rx="21" fill="#22c55e"/><text x="600" y="643" text-anchor="middle" class="white" style="font:700 19px Arial">Rest 60–90 seconds between sets</text></svg>