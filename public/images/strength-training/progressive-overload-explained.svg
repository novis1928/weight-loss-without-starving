<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img"><title>Progressive Overload Explained</title><defs><style>.title{font:700 42px Arial;fill:#0f172a}.subtitle{font:400 22px Arial;fill:#475569}.h{font:700 28px Arial;fill:#0f172a}.body{font:400 20px Arial;fill:#334155}.small{font:400 17px Arial;fill:#64748b}.label{font:700 18px Arial;fill:#166534}.white{fill:#fff}</style><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity=".12"/></filter><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#22c55e"/></marker></defs><rect width="1200" height="675" fill="#f8fafc"/><text x="600" y="72" text-anchor="middle" class="title">Progressive Overload Explained</text><text x="600" y="110" text-anchor="middle" class="subtitle">Small improvements create long-term progress</text><g filter="url(#shadow)"><rect x="70" y="210" width="230" height="220" rx="24" fill="#fff"/><rect x="350" y="180" width="230" height="250" rx="24" fill="#fff"/><rect x="630" y="145" width="230" height="285" rx="24" fill="#fff"/><rect x="910" y="105" width="230" height="325" rx="24" fill="#fff"/></g><circle cx="185" cy="255" r="38" fill="#dcfce7"/><text x="185" y="265" text-anchor="middle" class="h">1</text><circle cx="465" cy="225" r="38" fill="#dcfce7"/><text x="465" y="235" text-anchor="middle" class="h">2</text><circle cx="745" cy="190" r="38" fill="#dcfce7"/><text x="745" y="200" text-anchor="middle" class="h">3</text><circle cx="1025" cy="150" r="38" fill="#dcfce7"/><text x="1025" y="160" text-anchor="middle" class="h">4</text><text x="185" y="330" text-anchor="middle" class="h">Start</text><text x="185" y="368" text-anchor="middle" class="body">Learn technique</text><text x="465" y="300" text-anchor="middle" class="h">Add Reps</text><text x="465" y="338" text-anchor="middle" class="body">8 → 10 → 12</text><text x="745" y="265" text-anchor="middle" class="h">Add Weight</text><text x="745" y="303" text-anchor="middle" class="body">Increase gradually</text><text x="1025" y="225" text-anchor="middle" class="h">Repeat</text><text x="1025" y="263" text-anchor="middle" class="body">Stay consistent</text><path d="M300 320 H340" stroke="#22c55e" stroke-width="8" marker-end="url(#arrow)"/><path d="M580 285 H620" stroke="#22c55e" stroke-width="8" marker-end="url(#arrow)"/><path d="M860 250 H900" stroke="#22c55e" stroke-width="8" marker-end="url(#arrow)"/><rect x="175" y="505" width="850" height="100" rx="24" fill="#dcfce7"/><text x="600" y="548" text-anchor="middle" class="h">Progress does not require heavier weight every workout</text><text x="600" y="582" text-anchor="middle" class="body">Better form, more repetitions, and consistency also count.</text></svg>